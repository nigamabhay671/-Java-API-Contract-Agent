openapi: 3.0.1
info:
  title: Order Management API
  description: RESTful API for managing customer orders
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: Orders
    description: Order management operations

paths:
  /orders:
    get:
      tags:
        - Orders
      summary: Get all orders
      description: Retrieve a list of all orders
      operationId: getAllOrders
      responses:
        '200':
          description: List of orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'

    post:
      tags:
        - Orders
      summary: Create a new order
      description: Create a new order with the provided details
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieve a specific order by its ID
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Orders
      summary: Update an order
      description: Update an existing order with new details
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '400':
          description: Invalid request data
        '404':
          description: Order not found

    delete:
      tags:
        - Orders
      summary: Delete an order
      description: Delete an order by its ID
      operationId: deleteOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order deleted successfully
        '404':
          description: Order not found

  /orders/customer/{customerName}:
    get:
      tags:
        - Orders
      summary: Get orders by customer name
      description: Retrieve all orders for a specific customer
      operationId: getOrdersByCustomer
      parameters:
        - name: customerName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'

  /orders/status/{status}:
    get:
      tags:
        - Orders
      summary: Get orders by status
      description: Retrieve all orders with a specific status
      operationId: getOrdersByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, PROCESSING, COMPLETED, CANCELLED]
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'

components:
  schemas:
    OrderDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        customerName:
          type: string
          example: "John Doe"
        totalAmount:
          type: number
          format: double
          example: 299.99
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, CANCELLED]
          example: "PENDING"
        orderDate:
          type: string
          format: date-time
          example: "2024-04-08T10:30:00Z"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDto'

    OrderItemDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productName:
          type: string
          example: "Laptop"
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          format: double
          example: 149.99

    CreateOrderRequest:
      type: object
      required:
        - customerName
        - items
      properties:
        customerName:
          type: string
          minLength: 2
          maxLength: 100
          example: "John Doe"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'

    CreateOrderItemRequest:
      type: object
      required:
        - productName
        - quantity
        - unitPrice
      properties:
        productName:
          type: string
          minLength: 2
          maxLength: 200
        quantity:
          type: integer
          minimum: 1
          maximum: 1000
        unitPrice:
          type: number
          format: double
          minimum: 0.01

    UpdateOrderRequest:
      type: object
      properties:
        customerName:
          type: string
          minLength: 2
          maxLength: 100
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, CANCELLED]
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: "Order not found"
        errors:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time
